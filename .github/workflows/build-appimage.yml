name: Build AppImage (Continuous)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Check WF time, delete old continuous release and tag
    runs-on: ubuntu-latest
    steps:
      - name: Check workflow time
        shell: bash
        run: |
          TODAY=$(date +%Y-%m-%d)

          # Define end-of-life date
          EOL_DATE="2032-06-30"
          
          if [[ "$TODAY" > "$EOL_DATE" ]]; then
            echo "This container image is no longer supported after $EOL_DATE."
            exit 1
          else
            echo "Container image supported. Continuing workflow..."
          fi

      - name: DELETE request
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/Tomurisk/otpclient-appimage"

          # Query release by tag
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$API/releases/tags/continuous" || true)

          # Extract release ID safely
          RELEASE_ID=$(echo "$RESPONSE" | grep '"id":' | head -n1 | sed 's/[^0-9]*//g' || true)

          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting release ID: $RELEASE_ID"
            curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/releases/$RELEASE_ID" || true
          else
            echo "No existing release found."
          fi

          # Query tag
          TAG_RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$API/git/refs/tags/continuous" || true)

          if echo "$TAG_RESPONSE" | grep -q '"ref":' 2>/dev/null; then
            echo "Deleting tag: continuous"
            curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "$API/git/refs/tags/continuous" || true
          else
            echo "Tag 'continuous' does not exist."
          fi

  build-appimage:
    name: Build AppImage (${{ matrix.arch }})
    needs: cleanup
    runs-on: ${{ matrix.runner }}

    container:
      image: oraclelinux:9
      # Oracle Linux gives slightly smaller and newer binaries
      # Otherwise Ellison can drown in boiling piss for all I care

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@main

      - name: Update system
        run: |
          dnf -y update
          dnf install -y epel-release
          dnf config-manager --set-enabled ol9_codeready_builder

      - name: Install dependencies
        run: |
          dnf install -y \
            gcc-g++ wget cmake jq patch file \
            gtk3-devel libsecret-devel \
            protobuf-devel protobuf-c-devel \
            libgcrypt-devel libuuid-devel \
            jansson-devel libjpeg-turbo \
            qrencode-devel zbar-devel

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build AppImage
        run: ./build.sh

      - name: Upload AppImage
        uses: softprops/action-gh-release@master
        with:
          tag_name: continuous
          name: Continuous Build
          files: "*.AppImage"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
